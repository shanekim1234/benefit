<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>생활토크 혜택관</title>
<style>
:root{--navy:#061b38;--gold:#c49324;--red:#d71920;--line:#eadfcb;--cream:#fffaf1}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:#f3eee5;overflow-x:hidden;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;color:var(--navy)}
.page{width:100%;max-width:860px;margin:0 auto;background:#fff;overflow:hidden}
.hero{position:relative;height:300px;background:linear-gradient(90deg,#fff 0%,#fffdf7 47%,#f8f0df 100%);border-top:10px solid var(--navy);overflow:hidden}
.hero-text{position:absolute;left:16px;top:16px;width:54%;z-index:3}
.logo{width:90px;height:90px;object-fit:contain;border-radius:14px;display:block;margin-bottom:8px}
.brand-small{position:absolute;left:126px;top:29px;font-size:22px;font-weight:950;letter-spacing:-.06em}
.eyebrow{margin:0 0 8px;font-size:14px;font-weight:900;color:var(--gold);letter-spacing:-.05em;white-space:nowrap}
.title{margin:0;font-size:42px;line-height:.96;font-weight:950;letter-spacing:-.09em;color:var(--navy)}
.title span{display:block;color:var(--gold)}
.sub{margin:13px 0 0;font-size:15px;line-height:1.25;font-weight:900;letter-spacing:-.06em}
.actor{position:absolute;right:-38px;bottom:0;width:68%;height:292px;z-index:1}
.actor img{width:100%;height:100%;object-fit:cover;object-position:center;display:block}
.actor::before{content:"";position:absolute;inset:0;background:linear-gradient(90deg,#fff 0%,rgba(255,255,255,.85) 25%,rgba(255,255,255,0) 49%);z-index:2;pointer-events:none}
.cta-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:12px 14px;background:#fff}
.cta{min-width:0;min-height:54px;border:1.5px solid #b7bdc8;border-radius:8px;text-decoration:none;background:#fff;color:var(--navy);display:flex;align-items:center;justify-content:center;gap:8px;padding:7px 5px}
.cta.kakao{border-color:#d8a520}
.cta .icon{font-size:28px;line-height:1;font-weight:950}
.cta .talk{background:#3a2318;color:#ffd525;border-radius:50%;width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:950;flex-shrink:0}
.cta strong{display:block;font-size:14px;line-height:1.1;letter-spacing:-.06em}
.cta small{display:block;font-size:10px;line-height:1.1;margin-top:2px;color:#333;letter-spacing:-.04em}
.products{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:10px;background:#fffaf1}
.card{position:relative;background:#fff;border:1px solid var(--line);border-radius:16px;padding:24px 8px 10px;text-align:center;min-width:0;box-shadow:0 4px 10px rgba(6,27,56,.08)}
.num{position:absolute;left:10px;top:10px;width:28px;height:28px;border-radius:7px;background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:950;box-shadow:0 2px 5px rgba(0,0,0,.18)}
.card img{width:100%;height:94px;object-fit:contain;display:block;margin:0 auto 5px}
.brand{font-size:13px;font-weight:800;color:#333}
.name{font-size:20px;line-height:1.1;font-weight:950;letter-spacing:-.06em;min-height:43px;display:flex;align-items:center;justify-content:center;color:#111}
.market{font-size:13px;color:#555;margin-top:2px}
.market s{font-size:15px}
.badge{display:inline-block;background:var(--gold);color:#fff;border-radius:999px;padding:2px 8px;font-size:12px;font-weight:900;margin-top:3px}
.price{color:var(--red);font-size:29px;font-weight:950;line-height:1;letter-spacing:-.06em;margin-top:3px}
.price span{font-size:15px}
.note{text-align:center;font-size:13px;color:#333;padding:5px 10px 10px;background:#fff;letter-spacing:-.04em}
.footer{background:#fff;padding-bottom:8px}
@media(min-width:700px){
.hero{height:470px}.hero-text{left:34px;top:32px;width:52%}.logo{width:140px;height:140px}.brand-small{left:190px;top:48px;font-size:33px}.eyebrow{font-size:25px;margin-top:10px}.title{font-size:80px}.sub{font-size:28px}.actor{height:460px;width:64%;right:-18px}
.cta-row{padding:20px 42px;gap:26px}.cta{min-height:74px;border-radius:10px;gap:14px}.cta .icon{font-size:42px}.cta .talk{width:46px;height:46px;font-size:15px}.cta strong{font-size:24px}.cta small{font-size:17px}
.products{padding:18px 28px;gap:16px}.card{padding:32px 16px 16px}.num{width:44px;height:44px;font-size:29px;left:18px;top:18px}.card img{height:180px}.brand{font-size:19px}.name{font-size:31px;min-height:68px}.market{font-size:20px}.market s{font-size:23px}.badge{font-size:18px}.price{font-size:47px}.price span{font-size:24px}.note{font-size:19px;padding-bottom:18px}
}
</style>
</head>

  <section class="cta-row" id="topCta"></section>
  <section class="products" id="products"></section>
  <section class="footer">
    <section class="cta-row" id="bottomCta"></section>
    <div class="note">* 제품 번호(1~6번)로 주문하시면 더욱 빠르게 접수 가능합니다.</div>
  </section>

<script>
let storeData = null;

async function loadData(){
  try {
    const res = await fetch("data.json?v=" + Date.now());
    storeData = await res.json();
  } catch(e) {
    document.getElementById("products").innerHTML = "<p style='padding:20px'>제품 정보를 불러오지 못했습니다.</p>";
    console.error(e);
    return;
  }
  renderAll();
}

function renderCta(rootId){
  const s = storeData.settings;
  const clean = (s.phoneNumber || "").replaceAll("-","");
  const tel = `tel:${clean}`;
  const sms = `sms:${clean}?body=${encodeURIComponent(s.smsText || "")}`;
  const kakao = s.kakaoUrl || "#";
  document.getElementById(rootId).innerHTML = `
    <a class="cta" href="${tel}"><span class="icon">☎</span><span><strong>전화주문 요청</strong><small>바로 전화 연결</small></span></a>
    <a class="cta kakao" href="${kakao}" target="_blank" rel="noopener"><span class="talk">TALK</span><span><strong>카카오톡 주문요청</strong><small>카톡으로 빠른 주문</small></span></a>
    <a class="cta" href="${sms}"><span class="icon">✉</span><span><strong>문자주문 요청</strong><small>간편하게 문자 보내기</small></span></a>
  `;
}

function renderProducts(){
  document.getElementById("products").innerHTML = storeData.products.map((p,idx)=>`
    <article class="card">
      <div class="num">${idx+1}</div>
      <img src="${p.image}" alt="${p.name}">
      <div class="brand">${p.brand || ""}</div>
      <div class="name">${p.name}</div>
      <div class="market">시중가 <s>${p.marketPrice}</s></div>
      <div class="badge">혜택가</div>
      <div class="price">${String(p.benefitPrice).replace("원","")}<span>원</span></div>
    </article>
  `).join("");
}

function renderAll(){
  renderCta("topCta");
  renderProducts();
  renderCta("bottomCta");
}

loadData();
</script>

</html>
